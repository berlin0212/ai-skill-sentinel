name: 🛡️ 定时威胁情报更新

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨 00:00 (UTC) 抓取一次最新 IOC
  workflow_dispatch:      # 允许您在 GitHub 页面上点击按钮手动触发更新

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 必须开启写入权限，否则无法自动提交更新后的 rules.json
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🔄 更新黑名单并自动提交
        run: |
          python3 update_rules.py --fetch-ioc --commit
